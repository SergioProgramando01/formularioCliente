<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief Aniversario Distrioviedo</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}
.container{
    max-width:600px;
    margin:auto;
    background:#ffffff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    color:#1F5FAF;
}
.section{
    margin-bottom:20px;
}
label{
    font-weight:bold;
    display:block;
    margin-bottom:5px;
}
textarea, input[type="text"]{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:10px;
    border-radius:5px;
    border:1px solid #ccc;
}
button{
    width:100%;
    padding:12px;
    background:#FFC400;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
button:hover{
    background:#e6b000;
}
</style>
</head>

<body>

<div class="container">
<h2>Formulario Aniversario 10 Años</h2>

<div class="section">
<label>Frase oficial del aniversario:</label>
<textarea id="frase"></textarea>
</div>

<div class="section">
<label>Duración del aniversario:</label>
<textarea id="duracion"></textarea>
</div>

<div class="section">
<label>Palabras clave (Confianza, Crecimiento, etc):</label>
<textarea id="palabras"></textarea>
</div>

<div class="section">
<label>¿Habrá promociones / lanzamiento / evento físico?</label>
<textarea id="promociones"></textarea>
</div>

<div class="section">
<label>Espacios disponibles para grabación:</label>
<textarea id="espacios"></textarea>
</div>

<button onclick="enviarWhatsApp()">Enviar Respuestas</button>

</div>

<script>
function enviarWhatsApp(){

let frase = document.getElementById("frase").value;
let duracion = document.getElementById("duracion").value;
let palabras = document.getElementById("palabras").value;
let promociones = document.getElementById("promociones").value;
let espacios = document.getElementById("espacios").value;

let mensaje = `📌 Brief Aniversario Distrioviedo 10 Años

🟢 Frase oficial:
${frase}

📅 Duración:
${duracion}

🔑 Palabras clave:
${palabras}

🎉 Promociones / Evento:
${promociones}

🎥 Espacios para grabación:
${espacios}
`;

let url = "https://wa.me/573134897000?text=" + encodeURIComponent(mensaje);

window.open(url, "_blank");
}
</script>

</body>
</html>
